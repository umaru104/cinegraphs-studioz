<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CINEGRAPHS STUDIOZ</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>CINEGRAPHS STUDIOZ</h1>

<p>Book Your Cinematic Video Production</p>

<form id="bookingForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="tel" id="phone" placeholder="Phone Number" required>

<input type="email" id="email" placeholder="Email Address" required>

<select id="service" required>
<option value="">Select Service</option>
<option>Wedding Cinematics</option>
<option>Event Cinematics</option>
<option>Music Video Production</option>
<option>Commercial Video</option>
<option>Documentary Coverage</option>
</select>

<input type="date" id="date" required>

<input type="text" id="location" placeholder="Location" required>

<textarea id="details" placeholder="Project Details"></textarea>

<button type="submit">Book Now</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
